# Source registry for publiccode.yml files.
# Each entry maps a slug to its upstream source URL.
#
# Run `npm run sync:publiccode` to fetch/update all entries.
# Run `node scripts/sync-publiccode.mjs <slug>` to fetch one entry.
#
# GitHub repository URLs are resolved automatically:
#   https://github.com/{owner}/{repo}
#   → https://raw.githubusercontent.com/{owner}/{repo}/main/publiccode.yml
#   (falls back to master if main is not found)
#
# Direct raw URLs are also accepted:
#   source: https://example.org/path/to/publiccode.yml
#
# NAPCORE-specific overrides go under the 'override' key:
#   override:
#     categories: [...]
#     standards: [...]
#     endorsed: true
# These take precedence over anything in the publiccode.yml file.
# See PUBLICCODE.md for the full field reference.

shacl-validator:
  source: https://github.com/ISAITB/shacl-validator
  override:
    categories:
      - validators
      - data-quality
      - testing
    standards:
      - mobilitydcat-ap
      - rdf
      - dcat-ap

open_trip_planner:
  source: https://github.com/opentripplanner/opentripplanner
  override:
    categories:
      - route-planners
    standards:
      - gbfs
      - netex
      - gtfs
      - transmodel
      - siri
